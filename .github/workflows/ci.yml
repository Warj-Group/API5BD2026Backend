name: SonarCloud Analysis

on:
  push:
    # O SonarCloud analisará cada commit feito nestas branches
    branches:
      - main
  pull_request:
    # O SonarCloud analisará o PR quando o destino (target) for a main
    branches:
      - main
      - sprint-*
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4 # Atualizado para v4 (mais estável)
        with:
          fetch-depth: 0  # Necessário para que o Sonar analise o histórico e blame

      - name: SonarCloud Scan
        # Usamos a action específica para SonarCloud
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}